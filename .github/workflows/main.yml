name: Supabase Daily Active Trace

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시(UTC 00:00)에 실행
  workflow_dispatch: # 필요할 때 버튼 눌러서 즉시 실행 가능

jobs:
  wake_up_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Data from Supabase (Actual Query)
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/rules?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json"
