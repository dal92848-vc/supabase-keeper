name: Supabase Management API Wake Up

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 실행
  workflow_dispatch: # 직접 실행해보기 버튼

jobs:
  management_ping:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Project Details (Simulate Dashboard Login)
        run: |
          curl -f -X GET "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}"
